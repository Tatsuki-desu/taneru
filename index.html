<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Taneru — 気づきから研究へ</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.development.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.development.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #E8E2D9; font-family: 'Georgia', 'Times New Roman', serif; }
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-thumb { background: #8FB573; border-radius: 4px; }
  </style>
</head>
<body>
  <div id="root"></div>
 
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
    import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc, setDoc, query, orderBy } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";
    import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-auth.js";
 
    const firebaseConfig = {
      apiKey: "AIzaSyC44xqcJ3rs2aBqJLslaz51dj46Sck45Pw",
      authDomain: "taneru-53d46.firebaseapp.com",
      projectId: "taneru-53d46",
      storageBucket: "taneru-53d46.firebasestorage.app",
      messagingSenderId: "835922049",
      appId: "1:835922049:web:3df61514828833f930c580"
    };
 
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);
 
    window._taneruDB = db;
    window._taneruAuth = auth;
    window._taneruFirestore = { collection, addDoc, getDocs, deleteDoc, doc, setDoc, query, orderBy };
    window._taneruAuthFns = { signInWithEmailAndPassword, signOut, onAuthStateChanged };
    window._taneruDBReady = true;
    window.dispatchEvent(new Event("taneruDBReady"));
  </script>
 
  <script type="text/babel">
    const { useState, useEffect } = React;
    const C = {
      bg: "#F7F3ED", bgDeep: "#EDE7DC", green: "#2D5016", greenMid: "#4A7C2F",
      greenLight: "#8FB573", cream: "#FAF7F2", terra: "#C4622D",
      ink: "#1C1C1A", inkLight: "#6B6860", gold: "#D4A843",
    };
 
    // ── ユーザーIDを取得 ─────────────────────────
    function getUID() {
      return window._taneruAuth?.currentUser?.uid || null;
    }
 
    // ── Firestore操作（ユーザーごとに分離）───────
    function getDB() { return window._taneruDB; }
    function getFS() { return window._taneruFirestore; }
 
    // users/{uid}/entries
    async function fsAddEntry(entry) {
      const uid = getUID(); if (!uid) return;
      const { collection, addDoc } = getFS();
      await addDoc(collection(getDB(), "users", uid, "entries"), entry);
    }
    async function fsDeleteEntry(id) {
      const uid = getUID(); if (!uid) return;
      const { doc, deleteDoc } = getFS();
      await deleteDoc(doc(getDB(), "users", uid, "entries", id));
    }
    async function fsGetEntries() {
      const uid = getUID(); if (!uid) return [];
      const { collection, getDocs, query, orderBy } = getFS();
      const q = query(collection(getDB(), "users", uid, "entries"), orderBy("dateTime", "desc"));
      const snap = await getDocs(q);
      return snap.docs.map(d => ({ ...d.data(), id: d.id }));
    }
    async function fsAddAILog(log) {
      const uid = getUID(); if (!uid) return;
      const { collection, addDoc } = getFS();
      await addDoc(collection(getDB(), "users", uid, "ai_logs"), log);
    }
    async function fsGetAILogs() {
      const uid = getUID(); if (!uid) return [];
      const { collection, getDocs, query, orderBy } = getFS();
      const q = query(collection(getDB(), "users", uid, "ai_logs"), orderBy("dateTime", "desc"));
      const snap = await getDocs(q);
      return snap.docs.map(d => ({ ...d.data(), id: d.id }));
    }
 
    // ── ローカルキャッシュ（ユーザーごと）───────
    function localKey(key) {
      const uid = getUID();
      return uid ? `taneru_${uid}_${key}` : `taneru_${key}`;
    }
    function loadEntriesLocal() {
      const data = localStorage.getItem(localKey("entries"));
      return data ? JSON.parse(data) : [];
    }
    function saveEntriesLocal(entries) {
      localStorage.setItem(localKey("entries"), JSON.stringify(entries));
    }
 
    // ── AI呼び出し ───────────────────────────────
    async function callAI(prompt) {
      const apiKey = localStorage.getItem("taneru_api_key");
      if (!apiKey) { alert("設定画面でAPIキーを入力してください。"); return null; }
      try {
        const response = await fetch("https://api.anthropic.com/v1/messages", {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            "x-api-key": apiKey,
            "anthropic-version": "2023-06-01",
            "anthropic-dangerous-direct-browser-access": "true",
          },
          body: JSON.stringify({
            model: "claude-opus-4-6",
            max_tokens: 1000,
            messages: [{ role: "user", content: prompt }],
          }),
        });
        const data = await response.json();
        if (data.error) { alert("APIエラー：" + data.error.message); return null; }
        return data.content[0].text;
      } catch (e) { alert("通信エラーが発生しました。"); return null; }
    }
 
    // ── ログイン画面 ─────────────────────────────
    function LoginScreen() {
      const [email, setEmail] = useState("");
      const [password, setPassword] = useState("");
      const [error, setError] = useState("");
      const [loading, setLoading] = useState(false);
 
      const handleLogin = async () => {
        if (!email.trim() || !password.trim()) { setError("メールアドレスとパスワードを入力してください。"); return; }
        setLoading(true); setError("");
        try {
          const { signInWithEmailAndPassword } = window._taneruAuthFns;
          await signInWithEmailAndPassword(window._taneruAuth, email, password);
        } catch (e) {
          setError("メールアドレスまたはパスワードが正しくありません。");
        }
        setLoading(false);
      };
 
      return (
        <div style={{ minHeight: "100vh", background: C.bg, display: "flex", alignItems: "center", justifyContent: "center", padding: 20 }}>
          <div style={{ width: "100%", maxWidth: 380 }}>
            <div style={{ textAlign: "center", marginBottom: 32 }}>
              <div style={{ fontSize: 36, fontWeight: "bold", color: C.green, fontStyle: "italic", letterSpacing: "0.08em" }}>Taneru</div>
              <div style={{ fontSize: 11, color: C.inkLight, letterSpacing: "0.2em", textTransform: "uppercase", marginTop: 4 }}>気づきから研究へ</div>
              <div style={{ fontSize: 32, marginTop: 16, opacity: 0.3 }}>🌱</div>
            </div>
            <div style={{ background: C.cream, border: `1px solid ${C.bgDeep}`, borderRadius: 16, padding: "24px", boxShadow: "0 4px 20px rgba(0,0,0,0.06)" }}>
              <div style={{ fontSize: 15, fontWeight: "bold", color: C.ink, marginBottom: 20, textAlign: "center" }}>ログイン</div>
              <div style={{ marginBottom: 14 }}>
                <div style={{ fontSize: 11, fontWeight: "bold", color: C.green, letterSpacing: "0.1em", textTransform: "uppercase", marginBottom: 8 }}>メールアドレス</div>
                <input type="email" value={email} onChange={(e) => setEmail(e.target.value)} placeholder="example@email.com" style={{ width: "100%", border: `1.5px solid ${C.bgDeep}`, borderRadius: 12, padding: "12px 14px", fontSize: 14, fontFamily: "'Georgia', serif", background: C.bg, color: C.ink, outline: "none" }} />
              </div>
              <div style={{ marginBottom: 20 }}>
                <div style={{ fontSize: 11, fontWeight: "bold", color: C.green, letterSpacing: "0.1em", textTransform: "uppercase", marginBottom: 8 }}>パスワード</div>
                <input type="password" value={password} onChange={(e) => setPassword(e.target.value)} placeholder="パスワード" onKeyDown={(e) => e.key === "Enter" && handleLogin()} style={{ width: "100%", border: `1.5px solid ${C.bgDeep}`, borderRadius: 12, padding: "12px 14px", fontSize: 14, fontFamily: "'Georgia', serif", background: C.bg, color: C.ink, outline: "none" }} />
              </div>
              {error && <div style={{ background: C.terra + "22", border: `1px solid ${C.terra}44`, borderRadius: 10, padding: "10px 14px", fontSize: 12, color: C.terra, marginBottom: 14 }}>{error}</div>}
              <button onClick={handleLogin} disabled={loading} style={{ width: "100%", background: loading ? C.greenMid : C.green, color: C.cream, border: "none", borderRadius: 12, padding: "13px", fontSize: 14, cursor: "pointer", fontFamily: "'Georgia', serif", fontStyle: "italic" }}>
                {loading ? "ログイン中..." : "ログイン 🌱"}
              </button>
            </div>
            <div style={{ textAlign: "center", marginTop: 16, fontSize: 11, color: C.inkLight }}>アカウントは管理者が発行します</div>
          </div>
        </div>
      );
    }
 
    function SyncBadge({ synced }) {
      return <div style={{ fontSize: 10, color: synced ? C.greenLight : C.gold, letterSpacing: "0.08em" }}>{synced ? "☁️ クラウド同期済" : "⏳ 同期中..."}</div>;
    }
 
    // ── ホーム画面 ───────────────────────────────
    function HomeScreen() {
      const today = new Date().toLocaleDateString("ja-JP", { year: "numeric", month: "long", day: "numeric", weekday: "short" });
      const todayStr = new Date().toISOString().split("T")[0];
      const [selectedDate, setSelectedDate] = useState(todayStr);
      const [event, setEvent] = useState("");
      const [question, setQuestion] = useState("");
      const [tags, setTags] = useState([]);
      const [feedback, setFeedback] = useState("");
      const [entries, setEntries] = useState([]);
      const [saved, setSaved] = useState(false);
      const [search, setSearch] = useState("");
      const [synced, setSynced] = useState(false);
      const [loading, setLoading] = useState(true);
 
      useEffect(() => {
        const load = async () => {
          try {
            const data = await fsGetEntries();
            setEntries(data); saveEntriesLocal(data); setSynced(true);
          } catch(e) { setEntries(loadEntriesLocal()); }
          setLoading(false);
        };
        load();
      }, []);
 
      const toggleTag = (t) => setTags(prev => prev.includes(t) ? prev.filter(x => x !== t) : [...prev, t]);
 
      const handlePromote = (entry) => {
        const tab = window.confirm("実地研究Ⅱに追加しますか？\nOK → 実地研究Ⅱ\nキャンセル → 課題研究Ⅱ") ? 0 : 1;
        const key = localKey("promoted");
        const promoted = JSON.parse(localStorage.getItem(key) || "[]");
        const already = promoted.find(p => p.id === entry.id && p.tab === tab);
        if (already) { alert("すでに追加済みです。"); return; }
        localStorage.setItem(key, JSON.stringify([{ ...entry, tab }, ...promoted]));
        alert("研究ノートに追加しました！");
      };
 
      const handleDelete = async (id) => {
        if (!window.confirm("この記録を削除しますか？")) return;
        try {
          await fsDeleteEntry(id);
          const updated = entries.filter(e => e.id !== id);
          setEntries(updated); saveEntriesLocal(updated);
        } catch(e) {
          const updated = loadEntriesLocal().filter(e => e.id !== id);
          saveEntriesLocal(updated); setEntries(updated);
        }
      };
 
      const handleSave = async () => {
        if (!event.trim() && !question.trim()) return;
        const newEntry = {
          date: new Date(selectedDate + "T00:00:00").toLocaleDateString("ja-JP", { month: "numeric", day: "numeric" }),
          dateTime: new Date(selectedDate + "T00:00:00").toISOString(),
          event: event.trim(), question: question.trim(), tags, feedback: feedback.trim(),
        };
        setSaved(true);
        try {
          await fsAddEntry(newEntry);
          const data = await fsGetEntries();
          setEntries(data); saveEntriesLocal(data); setSynced(true);
        } catch(e) {
          const withId = { ...newEntry, id: Date.now().toString() };
          const updated = [withId, ...loadEntriesLocal()];
          saveEntriesLocal(updated); setEntries(updated);
        }
        setEvent(""); setQuestion(""); setTags([]); setFeedback("");
        setTimeout(() => setSaved(false), 2000);
      };
 
      const filteredEntries = entries.filter(e => {
        if (!search.trim()) return true;
        const kw = search.trim().toLowerCase();
        return (e.event||"").toLowerCase().includes(kw) || (e.question||"").toLowerCase().includes(kw) || (e.feedback||"").toLowerCase().includes(kw);
      });
 
      const emotionTags = ["😮 驚き", "😟 モヤモヤ", "💡 ひらめき", "❓ 疑問"];
 
      return (
        <div>
          <div style={{ marginBottom: 20 }}>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
              <div style={{ fontSize: 11, color: C.inkLight, letterSpacing: "0.12em" }}>{today}</div>
              <SyncBadge synced={synced} />
            </div>
            <div style={{ fontSize: 20, fontWeight: "bold", color: C.ink, fontStyle: "italic", marginTop: 4 }}>今日の気づきを記録する</div>
          </div>
          <div style={{ background: C.cream, border: `1px solid ${C.bgDeep}`, borderRadius: 16, padding: "18px 20px", marginBottom: 14, boxShadow: "0 2px 8px rgba(0,0,0,0.04)" }}>
            <div style={{ marginBottom: 14 }}>
              <div style={{ fontSize: 11, fontWeight: "bold", color: C.green, letterSpacing: "0.1em", textTransform: "uppercase", marginBottom: 8 }}>📅 記録する日付</div>
              <input type="date" value={selectedDate} onChange={(e) => setSelectedDate(e.target.value)} style={{ width: "100%", border: `1.5px solid ${C.bgDeep}`, borderRadius: 12, padding: "10px 14px", fontSize: 14, fontFamily: "'Georgia', serif", background: C.bg, color: C.ink, outline: "none" }} />
            </div>
            <div style={{ fontSize: 11, fontWeight: "bold", color: C.green, letterSpacing: "0.1em", textTransform: "uppercase", marginBottom: 8 }}>📝 今日の出来事・観察</div>
            <textarea value={event} onChange={(e) => setEvent(e.target.value)} rows={4} placeholder="今日の実習で気になったこと、観察したこと..." style={{ width: "100%", border: `1.5px solid ${C.bgDeep}`, borderRadius: 12, padding: "12px 14px", fontSize: 14, fontFamily: "'Georgia', serif", background: C.bg, color: C.ink, resize: "none", outline: "none", lineHeight: 1.6 }} />
            <div style={{ marginTop: 14 }}>
              <div style={{ fontSize: 11, fontWeight: "bold", color: C.green, letterSpacing: "0.1em", textTransform: "uppercase", marginBottom: 8 }}>💡 疑問・気づき</div>
              <textarea value={question} onChange={(e) => setQuestion(e.target.value)} rows={3} placeholder="「なぜ？」と思ったこと..." style={{ width: "100%", border: `1.5px solid ${C.bgDeep}`, borderRadius: 12, padding: "12px 14px", fontSize: 14, fontFamily: "'Georgia', serif", background: C.bg, color: C.ink, resize: "none", outline: "none", lineHeight: 1.6 }} />
            </div>
            <div style={{ marginTop: 14 }}>
              <div style={{ fontSize: 11, fontWeight: "bold", color: C.green, letterSpacing: "0.1em", textTransform: "uppercase", marginBottom: 8 }}>👨‍🏫 指導教員からのフィードバック</div>
              <textarea value={feedback} onChange={(e) => setFeedback(e.target.value)} rows={3} placeholder="先生から言われたこと、アドバイスなど..." style={{ width: "100%", border: `1.5px solid ${C.bgDeep}`, borderRadius: 12, padding: "12px 14px", fontSize: 14, fontFamily: "'Georgia', serif", background: C.bg, color: C.ink, resize: "none", outline: "none", lineHeight: 1.6 }} />
            </div>
            <div style={{ marginTop: 14 }}>
              <div style={{ fontSize: 11, fontWeight: "bold", color: C.green, letterSpacing: "0.1em", textTransform: "uppercase", marginBottom: 8 }}>🏷 感情タグ（タップで選択）</div>
              <div style={{ display: "flex", flexWrap: "wrap", gap: 6 }}>
                {emotionTags.map(t => (
                  <span key={t} onClick={() => toggleTag(t)} style={{ display: "inline-block", padding: "5px 12px", borderRadius: 20, fontSize: 12, background: tags.includes(t) ? C.greenMid : C.greenMid + "22", color: tags.includes(t) ? "#fff" : C.greenMid, cursor: "pointer", transition: "all 0.15s" }}>{t}</span>
                ))}
              </div>
            </div>
            <button onClick={handleSave} style={{ background: saved ? C.greenMid : C.green, color: C.cream, border: "none", borderRadius: 12, padding: "13px 24px", fontSize: 14, cursor: "pointer", fontFamily: "'Georgia', serif", fontStyle: "italic", width: "100%", marginTop: 16, transition: "background 0.2s" }}>
              {saved ? "保存しました！✓" : "この気づきを記録する 🌱"}
            </button>
          </div>
          {loading ? (
            <div style={{ textAlign: "center", padding: "20px", color: C.inkLight, fontSize: 13 }}>読み込み中...</div>
          ) : entries.length > 0 ? (
            <div>
              <div style={{ marginBottom: 12 }}>
                <input type="text" value={search} onChange={(e) => setSearch(e.target.value)} placeholder="🔍 キーワードで検索..." style={{ width: "100%", border: `1.5px solid ${C.bgDeep}`, borderRadius: 12, padding: "10px 14px", fontSize: 14, fontFamily: "'Georgia', serif", background: C.cream, color: C.ink, outline: "none" }} />
                <div style={{ fontSize: 11, color: C.inkLight, marginTop: 6, textAlign: "right" }}>
                  {search ? `「${search}」の検索結果：${filteredEntries.length}件` : `これまでの記録（${entries.length}件）`}
                </div>
              </div>
              {filteredEntries.map((entry) => (
                <div key={entry.id} style={{ background: C.cream, border: `1px solid ${C.bgDeep}`, borderLeft: `4px solid ${C.terra}`, borderRadius: 16, padding: "16px 20px", marginBottom: 12 }}>
                  <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 8 }}>
                    <span style={{ fontSize: 11, color: C.inkLight }}>{entry.date}</span>
                    <div style={{ display: "flex", alignItems: "center", gap: 4 }}>
                      {entry.tags && entry.tags.map(t => (
                        <span key={t} style={{ display: "inline-block", padding: "2px 8px", borderRadius: 20, fontSize: 10, background: C.terra + "22", color: C.terra }}>{t}</span>
                      ))}
                      <button onClick={() => handleDelete(entry.id)} style={{ background: "transparent", border: "none", color: C.inkLight, cursor: "pointer", fontSize: 16, padding: "0 4px" }}>🗑</button>
                    </div>
                  </div>
                  {entry.event && <div style={{ fontSize: 13, color: C.ink, lineHeight: 1.7, marginBottom: 4 }}>{entry.event}</div>}
                  {entry.question && <div style={{ fontSize: 13, color: C.greenMid, lineHeight: 1.7, fontStyle: "italic", marginBottom: 4 }}>💡 {entry.question}</div>}
                  {entry.feedback && <div style={{ fontSize: 13, color: C.gold, lineHeight: 1.7, fontStyle: "italic", marginBottom: 4 }}>👨‍🏫 {entry.feedback}</div>}
                  <button onClick={() => handlePromote(entry)} style={{ background: "transparent", color: C.green, border: `1.5px solid ${C.green}`, borderRadius: 10, padding: "6px 12px", fontSize: 11, cursor: "pointer", fontFamily: "'Georgia', serif", marginTop: 4 }}>🔬 研究に使う</button>
                </div>
              ))}
            </div>
          ) : (
            <div style={{ textAlign: "center", padding: "30px 20px", color: C.inkLight }}>
              <div style={{ fontSize: 40, marginBottom: 10, opacity: 0.4 }}>🌱</div>
              <div style={{ fontSize: 13 }}>記録を積み重ねると、<br />研究のテーマが見えてくる</div>
            </div>
          )}
        </div>
      );
    }
 
    // ── カレンダー画面 ───────────────────────────
    function CalendarScreen() {
      const [entries, setEntries] = useState([]);
      const [aiLogs, setAiLogs] = useState([]);
      const [selectedDay, setSelectedDay] = useState(null);
 
      useEffect(() => {
        const load = async () => {
          try { const data = await fsGetEntries(); setEntries(data); } catch(e) { setEntries(loadEntriesLocal()); }
          try { const logs = await fsGetAILogs(); setAiLogs(logs); } catch(e) {}
        };
        load();
      }, []);
 
      const days = ["月", "火", "水", "木", "金", "土", "日"];
      const today = new Date().getDate();
      const recordedDays = [...new Set(entries.map(e => new Date(e.dateTime).getDate()))];
      const aiDays = [...new Set(aiLogs.map(l => new Date(l.dateTime).getDate()))];
      const typeLabel = { rq: "🔬 RQ提案", keywords: "🔍 キーワード提案", literature: "📚 関連文献" };
      const dayEntries = selectedDay ? entries.filter(e => new Date(e.dateTime).getDate() === selectedDay) : [];
      const dayAILogs = selectedDay ? aiLogs.filter(l => new Date(l.dateTime).getDate() === selectedDay) : [];
 
      return (
        <div>
          <div style={{ fontSize: 20, fontWeight: "bold", color: C.ink, fontStyle: "italic", marginBottom: 4 }}>実習カレンダー</div>
          <div style={{ fontSize: 12, color: C.inkLight, marginBottom: 20 }}>記録した日が色づきます</div>
          <div style={{ background: C.cream, border: `1px solid ${C.bgDeep}`, borderRadius: 16, padding: "18px 20px", marginBottom: 14 }}>
            <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 14 }}>
              <span style={{ fontSize: 15, fontWeight: "bold", color: C.ink }}>{new Date().toLocaleDateString("ja-JP", { year: "numeric", month: "long" })}</span>
              <span style={{ background: C.greenMid, color: "#fff", borderRadius: 20, padding: "2px 12px", fontSize: 10, fontWeight: "bold" }}>実習中</span>
            </div>
            <div style={{ display: "grid", gridTemplateColumns: "repeat(7, 1fr)", gap: 4 }}>
              {days.map(d => <div key={d} style={{ textAlign: "center", fontSize: 10, color: C.inkLight, padding: "4px 0" }}>{d}</div>)}
              {Array.from({ length: 30 }, (_, i) => i + 1).map(d => {
                const isRec = recordedDays.includes(d);
                const isAI = aiDays.includes(d);
                const isToday = d === today;
                const isSelected = d === selectedDay;
                return (
                  <div key={d} onClick={() => setSelectedDay(d === selectedDay ? null : d)} style={{ textAlign: "center", padding: "5px 0", borderRadius: 8, fontSize: 12, background: isSelected ? C.terra : isToday ? C.green : isRec ? C.greenLight + "55" : "transparent", color: isSelected ? "#fff" : isToday ? "#fff" : isRec ? C.green : C.inkLight, fontWeight: isRec || isToday || isAI ? "bold" : "normal", cursor: "pointer", position: "relative" }}>
                    {d}
                    {isAI && <div style={{ width: 5, height: 5, borderRadius: "50%", background: C.gold, position: "absolute", bottom: 1, right: "50%", transform: "translateX(50%)" }} />}
                  </div>
                );
              })}
            </div>
            <div style={{ display: "flex", gap: 12, marginTop: 12 }}>
              <div style={{ display: "flex", alignItems: "center", gap: 4, fontSize: 10, color: C.inkLight }}><div style={{ width: 10, height: 10, borderRadius: 3, background: C.greenLight + "55" }} />日記あり</div>

    // ── 設定画面 ─────────────────────────────────
    function SettingsScreen({ onLogout, userEmail }) {
      const [exportStart, setExportStart] = useState("");
      const [exportEnd, setExportEnd] = useState("");
 
      const handleLogout = async () => {
        if (!window.confirm("ログアウトしますか？")) return;
        const { signOut } = window._taneruAuthFns;
        await signOut(window._taneruAuth);
        onLogout();
      };
 
      const handleClear = () => {
        if (!window.confirm("ローカルキャッシュを削除しますか？")) return;
        ["entries","rq","literatures","promoted","ai_logs","ai_rq","ai_keywords","ai_literature"].forEach(k => localStorage.removeItem(localKey(k)));
        alert("削除しました。");
      };
 
      const downloadText = (filename, content) => {
        const blob = new Blob([content], { type: "text/plain;charset=utf-8" });
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url; a.download = filename; a.click();
        URL.revokeObjectURL(url);
      };
 
      const exportDiary = async () => {
        let entries = [];
        try { entries = await fsGetEntries(); } catch(e) { entries = loadEntriesLocal(); }
        const start = exportStart ? new Date(exportStart + "T00:00:00") : null;
        const end = exportEnd ? new Date(exportEnd + "T23:59:59") : null;
        const filtered = entries.filter(e => { const d = new Date(e.dateTime); if (start && d < start) return false; if (end && d > end) return false; return true; });
        if (filtered.length === 0) { alert("指定した期間に記録がありません。"); return; }
        const dateLabel = exportStart || exportEnd ? `${exportStart || "最初"} 〜 ${exportEnd || "最新"}` : "全期間";
        let text = "===========================\nTaneru｜日記の記録\n";
        text += `出力日：${new Date().toLocaleDateString("ja-JP")}\n期間：${dateLabel}\n===========================\n\n`;
        filtered.forEach(e => {
          text += `■ ${e.date}\n`;
          if (e.event) text += `【出来事・観察】\n${e.event}\n\n`;
          if (e.question) text += `【疑問・気づき】\n${e.question}\n\n`;
          if (e.feedback) text += `【指導教員のフィードバック】\n${e.feedback}\n\n`;
          if (e.tags && e.tags.length > 0) text += `【タグ】${e.tags.join("　")}\n`;
          text += "---------------------------\n\n";
        });
        downloadText(`taneru_diary_${exportStart || "all"}.txt`, text);
      };
 
      const exportResearch = () => {
        const rq = JSON.parse(localStorage.getItem(localKey("rq")) || '{"text":["",""],"status":["仮","仮"]}');
        const promoted = JSON.parse(localStorage.getItem(localKey("promoted")) || "[]");
        const literatures = JSON.parse(localStorage.getItem(localKey("literatures")) || "[]");
        const tabLabels = ["実地研究Ⅱ", "課題研究Ⅱ"];
        let text = "===========================\nTaneru｜研究ノート\n";
        text += `出力日：${new Date().toLocaleDateString("ja-JP")}\n===========================\n\n`;
        tabLabels.forEach((label, i) => {
          text += `\n========== ${label} ==========\n\n`;
          text += `■ リサーチクエスチョン（${rq.status[i]}）\n${rq.text[i] || "（未入力）"}\n\n`;
          const pro = promoted.filter(p => p.tab === i);
          text += `■ 昇格した気づき（${pro.length}件）\n`;
          pro.forEach(p => { text += `\n${p.date}\n`; if (p.event) text += `・${p.event}\n`; if (p.question) text += `💡 ${p.question}\n`; });
          const lits = literatures.filter(l => l.tab === i);
          text += `\n■ 文献メモ（${lits.length}件）\n`;
          lits.forEach(l => { text += `\n【${l.title}】\n`; if (l.note) text += `${l.note}\n`; });
        });
        downloadText("taneru_research.txt", text);
      };
 
      const exportAll = async () => {
        let entries = [];
        try { entries = await fsGetEntries(); } catch(e) { entries = loadEntriesLocal(); }
        const start = exportStart ? new Date(exportStart + "T00:00:00") : null;
        const end = exportEnd ? new Date(exportEnd + "T23:59:59") : null;
        const filtered = entries.filter(e => { const d = new Date(e.dateTime); if (start && d < start) return false; if (end && d > end) return false; return true; });
        const rq = JSON.parse(localStorage.getItem(localKey("rq")) || '{"text":["",""],"status":["仮","仮"]}');
        const promoted = JSON.parse(localStorage.getItem(localKey("promoted")) || "[]");
        const literatures = JSON.parse(localStorage.getItem(localKey("literatures")) || "[]");
        const tabLabels = ["実地研究Ⅱ", "課題研究Ⅱ"];
        const dateLabel = exportStart || exportEnd ? `${exportStart || "最初"} 〜 ${exportEnd || "最新"}` : "全期間";
        let text = "===========================\nTaneru｜全体レポート\n";
        text += `出力日：${new Date().toLocaleDateString("ja-JP")}\n日記の期間：${dateLabel}\n===========================\n\n`;
        tabLabels.forEach((label, i) => {
          text += `\n========== ${label} ==========\n\n`;
          text += `■ リサーチクエスチョン（${rq.status[i]}）\n${rq.text[i] || "（未入力）"}\n\n`;
          const pro = promoted.filter(p => p.tab === i);
          text += `■ 昇格した気づき（${pro.length}件）\n`;
          pro.forEach(p => { text += `\n${p.date}\n`; if (p.event) text += `・${p.event}\n`; if (p.question) text += `💡 ${p.question}\n`; });
          const lits = literatures.filter(l => l.tab === i);
          text += `\n■ 文献メモ（${lits.length}件）\n`;
          lits.forEach(l => { text += `\n【${l.title}】\n`; if (l.note) text += `${l.note}\n`; });
        });
        text += "\n\n===========================\n";
        text += `■ 日記の記録（${filtered.length}件）\n===========================\n\n`;
        filtered.forEach(e => {
          text += `■ ${e.date}\n`;
          if (e.event) text += `【出来事・観察】\n${e.event}\n\n`;
          if (e.question) text += `【疑問・気づき】\n${e.question}\n\n`;
          if (e.feedback) text += `【指導教員のフィードバック】\n${e.feedback}\n\n`;
          if (e.tags && e.tags.length > 0) text += `【タグ】${e.tags.join("　")}\n`;
          text += "---------------------------\n\n";
        });
        downloadText(`taneru_report_${exportStart || "all"}.txt`, text);
      };
 
      return (
        <div>
          <div style={{ fontSize: 20, fontWeight: "bold", color: C.ink, fontStyle: "italic", marginBottom: 4 }}>設定</div>
          <div style={{ fontSize: 12, color: C.inkLight, marginBottom: 20 }}>実習情報・アプリの設定</div>
          <div style={{ background: C.cream, border: `1px solid ${C.bgDeep}`, borderRadius: 16, padding: "18px 20px", marginBottom: 14 }}>
            <div style={{ fontSize: 11, fontWeight: "bold", color: C.green, letterSpacing: "0.1em", textTransform: "uppercase", marginBottom: 12 }}>👤 ログイン中</div>
            <div style={{ fontSize: 13, color: C.ink }}>{userEmail}</div>
          </div>
          <div style={{ background: C.cream, border: `1px solid ${C.bgDeep}`, borderRadius: 16, padding: "18px 20px", marginBottom: 14 }}>
            <div style={{ fontSize: 11, fontWeight: "bold", color: C.green, letterSpacing: "0.1em", textTransform: "uppercase", marginBottom: 12 }}>🤖 API設定</div>
            <div style={{ fontSize: 13, color: C.ink, lineHeight: 1.7, marginBottom: 12 }}>AnthropicのAPIキーを入力してください。</div>
            <input type="password" defaultValue={localStorage.getItem("taneru_api_key") || ""} onChange={(e) => localStorage.setItem("taneru_api_key", e.target.value)} placeholder="sk-ant-api03-..." style={{ width: "100%", border: `1.5px solid ${C.bgDeep}`, borderRadius: 12, padding: "10px 14px", fontSize: 13, fontFamily: "'Georgia', serif", background: C.bg, color: C.ink, outline: "none", marginBottom: 8 }} />
            <div style={{ fontSize: 11, color: C.inkLight }}>※APIキーはこのブラウザにのみ保存されます。</div>
          </div>
          <div style={{ background: C.cream, border: `1px solid ${C.bgDeep}`, borderRadius: 16, padding: "18px 20px", marginBottom: 14 }}>
            <div style={{ fontSize: 11, fontWeight: "bold", color: C.green, letterSpacing: "0.1em", textTransform: "uppercase", marginBottom: 14 }}>💾 エクスポート</div>
            <div style={{ background: C.bg, borderRadius: 12, padding: "12px 14px", marginBottom: 14 }}>
              <div style={{ fontSize: 11, color: C.inkLight, marginBottom: 8 }}>①③の日付範囲（省略すると全期間）</div>
              <div style={{ display: "flex", gap: 8, alignItems: "center" }}>
                <input type="date" value={exportStart} onChange={(e) => setExportStart(e.target.value)} style={{ flex: 1, border: `1.5px solid ${C.bgDeep}`, borderRadius: 10, padding: "8px 10px", fontSize: 12, fontFamily: "'Georgia', serif", background: C.cream, color: C.ink, outline: "none" }} />
                <span style={{ fontSize: 12, color: C.inkLight }}>〜</span>
                <input type="date" value={exportEnd} onChange={(e) => setExportEnd(e.target.value)} style={{ flex: 1, border: `1.5px solid ${C.bgDeep}`, borderRadius: 10, padding: "8px 10px", fontSize: 12, fontFamily: "'Georgia', serif", background: C.cream, color: C.ink, outline: "none" }} />
              </div>
            </div>
            <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
              <button onClick={exportDiary} style={{ background: "transparent", color: C.green, border: `1.5px solid ${C.green}`, borderRadius: 12, padding: "11px", fontSize: 13, cursor: "pointer", fontFamily: "'Georgia', serif" }}>① 日記の記録をエクスポート</button>
              <button onClick={exportResearch} style={{ background: "transparent", color: C.green, border: `1.5px solid ${C.green}`, borderRadius: 12, padding: "11px", fontSize: 13, cursor: "pointer", fontFamily: "'Georgia', serif" }}>② 研究ノートをエクスポート</button>
              <button onClick={exportAll} style={{ background: C.green, color: C.cream, border: "none", borderRadius: 12, padding: "11px", fontSize: 13, cursor: "pointer", fontFamily: "'Georgia', serif" }}>③ 全体レポートをエクスポート</button>
            </div>
          </div>
          <div style={{ background: C.cream, border: `1px solid ${C.bgDeep}`, borderRadius: 16, padding: "18px 20px", marginBottom: 14 }}>
            <div style={{ fontSize: 11, fontWeight: "bold", color: C.green, letterSpacing: "0.1em", textTransform: "uppercase", marginBottom: 12 }}>🗄 データ管理</div>
            <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
              <button onClick={handleClear} style={{ background: "transparent", color: C.terra, border: `1.5px solid ${C.terra}`, borderRadius: 12, padding: "10px", fontSize: 13, cursor: "pointer", fontFamily: "'Georgia', serif" }}>ローカルキャッシュを削除する</button>
              <button onClick={handleLogout} style={{ background: C.terra, color: "#fff", border: "none", borderRadius: 12, padding: "10px", fontSize: 13, cursor: "pointer", fontFamily: "'Georgia', serif" }}>ログアウト</button>
            </div>
          </div>
          <div style={{ textAlign: "center", marginTop: 20, color: C.inkLight, fontSize: 11, letterSpacing: "0.1em" }}>Taneru v0.4 — 気づきから研究へ 🌱</div>
        </div>
      );
    }
 
    // ── メインアプリ ─────────────────────────────
    const NAV = [
      { id: "home", icon: "✏️", label: "記録" },
      { id: "calendar", icon: "📅", label: "カレンダー" },
      { id: "ai", icon: "🤖", label: "AI分析" },
      { id: "research", icon: "🔬", label: "研究" },
      { id: "settings", icon: "⚙️", label: "設定" },
    ];
 
    function App() {
      const [screen, setScreen] = useState("home");
      const [user, setUser] = useState(null);
      const [authChecked, setAuthChecked] = useState(false);
 
      useEffect(() => {
        const check = () => {
          const { onAuthStateChanged } = window._taneruAuthFns;
          onAuthStateChanged(window._taneruAuth, (u) => {
            setUser(u);
            setAuthChecked(true);
          });
        };
        if (window._taneruDBReady) check();
        else window.addEventListener("taneruDBReady", check, { once: true });
      }, []);
 
      if (!authChecked) {
        return (
          <div style={{ minHeight: "100vh", background: C.bg, display: "flex", alignItems: "center", justifyContent: "center" }}>
            <div style={{ fontSize: 36, opacity: 0.3 }}>🌱</div>
          </div>
        );
      }
 
      if (!user) return <LoginScreen />;
 
      const screens = {
        home: <HomeScreen />, calendar: <CalendarScreen />, ai: <AIScreen />,
        research: <ResearchScreen />,
        settings: <SettingsScreen onLogout={() => setUser(null)} userEmail={user.email} />,
      };
 
      return (
        <div style={{ fontFamily: "'Georgia', 'Times New Roman', serif", background: C.bg, minHeight: "100vh", maxWidth: 440, margin: "0 auto", display: "flex", flexDirection: "column", boxShadow: "0 0 40px rgba(0,0,0,0.12)" }}>
          <div style={{ background: C.green, padding: "18px 24px 14px", display: "flex", alignItems: "center", justifyContent: "space-between", position: "relative", overflow: "hidden" }}>
            <div>
              <div style={{ fontSize: 22, fontWeight: "bold", color: "#FAF7F2", letterSpacing: "0.08em", fontStyle: "italic" }}>Taneru</div>
              <div style={{ fontSize: 10, color: "#8FB573", letterSpacing: "0.2em", textTransform: "uppercase", marginTop: 2 }}>気づきから研究へ</div>
            </div>
            <div style={{ fontSize: 10, color: "#8FB573", opacity: 0.8, maxWidth: 160, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{user.email}</div>
          </div>
          <div style={{ flex: 1, overflowY: "auto", padding: "20px 20px 100px" }}>
            {screens[screen]}
          </div>
          <div style={{ position: "sticky", bottom: 0, background: "#FAF7F2", borderTop: `1px solid ${C.bgDeep}`, display: "flex", justifyContent: "space-around", padding: "10px 0 16px", boxShadow: "0 -4px 20px rgba(0,0,0,0.06)" }}>
            {NAV.map(({ id, icon, label }) => (
              <div key={id} onClick={() => setScreen(id)} style={{ display: "flex", flexDirection: "column", alignItems: "center", gap: 3, cursor: "pointer", padding: "4px 10px", borderRadius: 12, background: screen === id ? C.green + "18" : "transparent", transition: "all 0.15s" }}>
                <span style={{ fontSize: 22, opacity: screen === id ? 1 : 0.5 }}>{icon}</span>
                <span style={{ fontSize: 9, color: screen === id ? C.green : C.inkLight, fontWeight: screen === id ? "bold" : "normal", letterSpacing: "0.08em" }}>{label}</span>
              </div>
            ))}
          </div>
        </div>
      );
    }
 
    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
