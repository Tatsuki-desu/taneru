<body>
  <div id="root"></div>
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
    import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc, setDoc, getDoc, updateDoc, query, orderBy } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";
    import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-auth.js";
    const firebaseConfig = {
      apiKey: "AIzaSyC44xqcJ3rs2aBqJLslaz51dj46Sck45Pw",
      authDomain: "taneru-53d46.firebaseapp.com",
      projectId: "taneru-53d46",
      storageBucket: "taneru-53d46.firebasestorage.app",
      messagingSenderId: "835922049",
      appId: "1:835922049:web:3df61514828833f930c580"

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);
    window._taneruDB = db;
    window._taneruAuth = auth;
    window._taneruFirestore = { collection, addDoc, getDocs, deleteDoc, doc, setDoc, getDoc, updateDoc, query, orderBy };
    window._taneruAuthFns = { signInWithEmailAndPassword, signOut, onAuthStateChanged };
    window._taneruDBReady = true;
    window.dispatchEvent(new Event("taneruDBReady"));
  </script>
  <script type="text/babel">
    const { useState, useEffect, useCallback } = React;
    const C = {
      bg: "#F7F3ED", bgDeep: "#EDE7DC", green: "#2D5016", greenMid: "#4A7C2F",
      greenLight: "#8FB573", cream: "#FAF7F2", terra: "#C4622D",
      ink: "#1C1C1A", inkLight: "#6B6860", gold: "#D4A843",
    };
 
    const ADMIN_EMAIL = "t.shib3655@gmail.com";
    function getUID() { return window._taneruAuth?.currentUser?.uid || null; }
    function getEmail() { return window._taneruAuth?.currentUser?.email || ""; }
    function isAdmin() { return getEmail() === ADMIN_EMAIL; }
    function getDB() { return window._taneruDB; }
    function getFS() { return window._taneruFirestore; }
 
    // ── Firestore：日記 ──────────────────────────
    async function fsAddEntry(entry) {
      const uid = getUID(); if (!uid) return;
      const { collection, addDoc } = getFS();
      return await addDoc(collection(getDB(), "users", uid, "entries"), entry);
    }
    async function fsUpdateEntry(id, data) {
      const uid = getUID(); if (!uid) return;
      const { doc, updateDoc } = getFS();
      await updateDoc(doc(getDB(), "users", uid, "entries", id), data);
    }
    async function fsDeleteEntry(id) {
      const uid = getUID(); if (!uid) return;
      const { doc, deleteDoc } = getFS();
      await deleteDoc(doc(getDB(), "users", uid, "entries", id));
    }
    async function fsGetEntries() {
      const uid = getUID(); if (!uid) return [];
      const { collection, getDocs, query, orderBy } = getFS();
      const q = query(collection(getDB(), "users", uid, "entries"), orderBy("dateTime", "desc"));
      const snap = await getDocs(q);
      return snap.docs.map(d => ({ ...d.data(), id: d.id }));
    }
    async function fsAddAILog(log) {
      const uid = getUID(); if (!uid) return;
      const { collection, addDoc } = getFS();
      await addDoc(collection(getDB(), "users", uid, "ai_logs"), log);
    }
    async function fsGetAILogs() {
      const uid = getUID(); if (!uid) return [];
      const { collection, getDocs, query, orderBy } = getFS();
      const q = query(collection(getDB(), "users", uid, "ai_logs"), orderBy("dateTime", "desc"));
      const snap = await getDocs(q);
      return snap.docs.map(d => ({ ...d.data(), id: d.id }));
    }
    async function fsSaveResearchNote(data) {
      const uid = getUID(); if (!uid) return;
      const { doc, setDoc } = getFS();
      await setDoc(doc(getDB(), "users", uid, "research", "note"), data);
    }
    async function fsGetResearchNote() {
      const uid = getUID(); if (!uid) return null;
      const { doc, getDoc } = getFS();
      const snap = await getDoc(doc(getDB(), "users", uid, "research", "note"));
      return snap.exists() ? snap.data() : null;
    }
    async function fsAddPromoted(entry) {
      const uid = getUID(); if (!uid) return;
      const { collection, addDoc } = getFS();
      await addDoc(collection(getDB(), "users", uid, "promoted"), entry);
    }
    async function fsDeletePromoted(id) {
      const uid = getUID(); if (!uid) return;
      const { doc, deleteDoc } = getFS();
      await deleteDoc(doc(getDB(), "users", uid, "promoted", id));
    }
    async function fsGetPromoted() {
      const uid = getUID(); if (!uid) return [];
      const { collection, getDocs, query, orderBy } = getFS();
      const q = query(collection(getDB(), "users", uid, "promoted"), orderBy("promotedAt", "desc"));
      const snap = await getDocs(q);
      return snap.docs.map(d => ({ ...d.data(), id: d.id }));
    }
    async function fsAddLiterature(lit) {
      const uid = getUID(); if (!uid) return;
      const { collection, addDoc } = getFS();
      await addDoc(collection(getDB(), "users", uid, "literatures"), lit);
    }
    async function fsDeleteLiterature(id) {
      const uid = getUID(); if (!uid) return;
      const { doc, deleteDoc } = getFS();
      await deleteDoc(doc(getDB(), "users", uid, "literatures", id));
    }
    async function fsGetLiteratures() {
      const uid = getUID(); if (!uid) return [];
      const { collection, getDocs, query, orderBy } = getFS();
      const q = query(collection(getDB(), "users", uid, "literatures"), orderBy("createdAt", "desc"));
      const snap = await getDocs(q);
      return snap.docs.map(d => ({ ...d.data(), id: d.id }));
    }
    async function fsAddPost(post) {
      const { collection, addDoc } = getFS();
      await addDoc(collection(getDB(), "shared_posts"), post);
    }
    async function fsGetPosts() {
      const { collection, getDocs, query, orderBy } = getFS();
      const q = query(collection(getDB(), "shared_posts"), orderBy("dateTime", "desc"));
      const snap = await getDocs(q);
      return snap.docs.map(d => ({ ...d.data(), id: d.id }));
    }
    async function fsDeletePost(id) {
      const { doc, deleteDoc } = getFS();
      await deleteDoc(doc(getDB(), "shared_posts", id));
    }
    async function fsAddComment(postId, comment) {
      const { collection, addDoc } = getFS();
      await addDoc(collection(getDB(), "shared_posts", postId, "comments"), comment);
    }
    async function fsGetComments(postId) {
      const { collection, getDocs, query, orderBy } = getFS();
      const q = query(collection(getDB(), "shared_posts", postId, "comments"), orderBy("dateTime", "asc"));
      const snap = await getDocs(q);
      return snap.docs.map(d => ({ ...d.data(), id: d.id }));
    }
    async function fsDeleteComment(postId, commentId) {
      const { doc, deleteDoc } = getFS();
      await deleteDoc(doc(getDB(), "shared_posts", postId, "comments", commentId));
    }
 
    function localKey(key) {
      const uid = getUID();
      return uid ? `taneru_${uid}_${key}` : `taneru_${key}`;
    }
    function loadEntriesLocal() {
      const data = localStorage.getItem(localKey("entries"));
      return data ? JSON.parse(data) : [];
    }
    function saveEntriesLocal(entries) {
      localStorage.setItem(localKey("entries"), JSON.stringify(entries));
    }
 
    async function callAI(prompt) {
      const apiKey = localStorage.getItem("taneru_api_key");
      if (!apiKey) { alert("設定画面でAPIキーを入力してください。"); return null; }
      try {
        const response = await fetch("https://api.anthropic.com/v1/messages", {
          method: "POST",
          headers: { "Content-Type": "application/json", "x-api-key": apiKey, "anthropic-version": "2023-06-01", "anthropic-dangerous-direct-browser-access": "true" },
          body: JSON.stringify({ model: "claude-opus-4-6", max_tokens: 1500, messages: [{ role: "user", content: prompt }] }),
        });
        const data = await response.json();
        if (data.error) { alert("APIエラー：" + data.error.message); return null; }
        return data.content[0].text;
      } catch (e) { alert("通信エラーが発生しました。"); return null; }
    }
 
    // ── ログイン画面 ─────────────────────────────
    function LoginScreen() {
      const [email, setEmail] = useState("");
      const [password, setPassword] = useState("");
      const [error, setError] = useState("");
      const [loading, setLoading] = useState(false);
      const handleLogin = async () => {
        if (!email.trim() || !password.trim()) { setError("メールアドレスとパスワードを入力してください。"); return; }
        setLoading(true); setError("");
        try { await window._taneruAuthFns.signInWithEmailAndPassword(window._taneruAuth, email, password); }
        catch (e) { setError("メールアドレスまたはパスワードが正しくありません。"); }
        setLoading(false);
      };
      return (
        <div style={{ minHeight: "100vh", background: C.bg, display: "flex", alignItems: "center", justifyContent: "center", padding: 20 }}>
          <div style={{ width: "100%", maxWidth: 380 }}>
            <div style={{ textAlign: "center", marginBottom: 32 }}>
              <div style={{ fontSize: 36, fontWeight: "bold", color: C.green, fontStyle: "italic" }}>Taneru</div>
              <div style={{ fontSize: 11, color: C.inkLight, letterSpacing: "0.2em", textTransform: "uppercase", marginTop: 4 }}>気づきから研究へ</div>
              <div style={{ fontSize: 32, marginTop: 16, opacity: 0.3 }}>🌱</div>
            </div>
            <div style={{ background: C.cream, border: `1px solid ${C.bgDeep}`, borderRadius: 16, padding: "24px", boxShadow: "0 4px 20px rgba(0,0,0,0.06)" }}>
              <div style={{ fontSize: 15, fontWeight: "bold", color: C.ink, marginBottom: 20, textAlign: "center" }}>ログイン</div>
              <div style={{ marginBottom: 14 }}>
                <div style={{ fontSize: 11, fontWeight: "bold", color: C.green, letterSpacing: "0.1em", textTransform: "uppercase", marginBottom: 8 }}>メールアドレス</div>
                <input type="email" value={email} onChange={(e) => setEmail(e.target.value)} placeholder="example@email.com" style={{ width: "100%", border: `1.5px solid ${C.bgDeep}`, borderRadius: 12, padding: "12px 14px", fontSize: 14, fontFamily: "'Georgia', serif", background: C.bg, color: C.ink, outline: "none" }} />
              </div>
              <div style={{ marginBottom: 20 }}>
                <div style={{ fontSize: 11, fontWeight: "bold", color: C.green, letterSpacing: "0.1em", textTransform: "uppercase", marginBottom: 8 }}>パスワード</div>
                <input type="password" value={password} onChange={(e) => setPassword(e.target.value)} placeholder="パスワード" onKeyDown={(e) => e.key === "Enter" && handleLogin()} style={{ width: "100%", border: `1.5px solid ${C.bgDeep}`, borderRadius: 12, padding: "12px 14px", fontSize: 14, fontFamily: "'Georgia', serif", background: C.bg, color: C.ink, outline: "none" }} />
              </div>
              {error && <div style={{ background: C.terra + "22", border: `1px solid ${C.terra}44`, borderRadius: 10, padding: "10px 14px", fontSize: 12, color: C.terra, marginBottom: 14 }}>{error}</div>}
              <button onClick={handleLogin} disabled={loading} style={{ width: "100%", background: loading ? C.greenMid : C.green, color: C.cream, border: "none", borderRadius: 12, padding: "13px", fontSize: 14, cursor: "pointer", fontFamily: "'Georgia', serif", fontStyle: "italic" }}>
                {loading ? "ログイン中..." : "ログイン 🌱"}
              </button>
            </div>
            <div style={{ textAlign: "center", marginTop: 16, fontSize: 11, color: C.inkLight }}>アカウントは管理者が発行します</div>
          </div>
        </div>
      );
    }
 
    function SyncBadge({ synced }) {
      return <div style={{ fontSize: 10, color: synced ? C.greenLight : C.gold }}>{synced ? "☁️ クラウド同期済" : "⏳ 同期中..."}</div>;
    }
 
    // ── ヘルプ画面 ───────────────────────────────
    function HelpScreen({ onClose }) {
      const sections = [
        { icon: "✏️", title: "記録画面", items: ["日付を選んで、その日の出来事・疑問・フィードバックを記録します。", "感情タグ（驚き・モヤモヤ・ひらめき・疑問）を選んで気持ちも記録できます。", "「🔬 研究に使う」→ 記録を研究ノートに昇格させます。", "「📋 掲示板に共有」→ 仲間と気づきを共有できます。", "✏️ ボタンで記録を後から編集できます。", "過去の日付を選べば、先週の記録も後から入力できます。", "デフォルトでは今日の記録のみ表示されます。キーワード検索すると全件表示されます。"] },
        { icon: "🔬", title: "研究ノート画面", items: ["実地研究Ⅱと課題研究Ⅱのタブで切り替えて管理できます。", "リサーチクエスチョン（研究で答えたい問い）を書いて保存します。", "「🤖 RQを提案してもらう」→ AIが日記をもとにRQ候補を3つ提案します。", "「🔭 研究の方向性を提案してもらう」→ 昇格した気づきから研究の方向性を示します。", "「🔍 検索キーワード提案」→ 文献検索に使えるキーワードを提案します。", "「📚 関連文献を探す」→ AIが関連する学術文献を紹介します（要CiNiiで確認）。", "研究ノートのデータはクラウドに保存されます。"] },
        { icon: "📋", title: "掲示板画面", items: ["記録画面から共有した気づきが表示されます。", "「💬 コメント」をタップするとコメントの入力欄が開きます。", "投稿の削除は投稿した本人のみできます（管理者は全件削除可能）。", "コメントの削除は誰でもできます。"] },
        { icon: "📅", title: "カレンダー画面", items: ["記録した日が緑色に色づきます。", "AI提案があった日には金色の点が表示されます。", "日付をタップするとその日の記録とAI提案が確認できます。"] },
        { icon: "⚙️", title: "設定画面", items: ["AnthropicのAPIキーを入力するとAI機能が使えるようになります。", "日記の記録・研究ノート・全体レポートをテキストファイルでエクスポートできます。", "ログアウトボタンでアカウントを切り替えられます。"] },
        { icon: "❓", title: "困ったときは", items: ["記録が表示されない → ページを再読み込みしてください。", "AI機能が使えない → 設定画面でAPIキーを確認してください。", "ログインできない → メールアドレスとパスワードを確認してください。管理者に連絡しましょう。"] },
      ];
      return (
        <div style={{ position: "fixed", top: 0, left: "50%", transform: "translateX(-50%)", width: "100%", maxWidth: 440, height: "100%", background: C.bg, zIndex: 1000, overflowY: "auto" }}>
          <div style={{ background: C.green, padding: "18px 24px 14px", display: "flex", alignItems: "center", justifyContent: "space-between" }}>
            <div>
              <div style={{ fontSize: 18, fontWeight: "bold", color: "#FAF7F2", fontStyle: "italic" }}>使い方ガイド</div>
              <div style={{ fontSize: 10, color: "#8FB573", marginTop: 2 }}>Taneru の使い方</div>
            </div>
            <button onClick={onClose} style={{ background: "transparent", border: "none", color: "#FAF7F2", fontSize: 22, cursor: "pointer" }}>✕</button>
          </div>
          <div style={{ padding: "20px" }}>
            <div style={{ background: C.cream, border: `1px solid ${C.bgDeep}`, borderRadius: 16, padding: "16px 20px", marginBottom: 14 }}>
              <div style={{ fontSize: 13, color: C.ink, lineHeight: 1.8 }}>Taneruは実習中の気づきを記録して、研究テーマを育てるためのアプリです。毎日少しずつ記録を積み重ねることで、研究の種が見つかります🌱</div>
            </div>
            {sections.map((s) => (
              <div key={s.title} style={{ background: C.cream, border: `1px solid ${C.bgDeep}`, borderRadius: 16, padding: "16px 20px", marginBottom: 14 }}>
                <div style={{ fontSize: 14, fontWeight: "bold", color: C.green, marginBottom: 12 }}>{s.icon} {s.title}</div>
                {s.items.map((item, i) => (
                  <div key={i} style={{ display: "flex", gap: 8, marginBottom: 8, fontSize: 13, color: C.ink, lineHeight: 1.7 }}>
                    <span style={{ color: C.greenLight, flexShrink: 0 }}>•</span>
                    <span>{item}</span>
                  </div>
                ))}
              </div>
            ))}
          </div>
        </div>
      );
    }
 
    // ── 編集モーダル ─────────────────────────────
    function EditModal({ entry, onSave, onClose }) {
      const [date, setDate] = useState(entry.dateTime ? entry.dateTime.split("T")[0] : "");
      const [event, setEvent] = useState(entry.event || "");
      const [question, setQuestion] = useState(entry.question || "");
      const [feedback, setFeedback] = useState(entry.feedback || "");
      const [tags, setTags] = useState(entry.tags || []);
      const [keywordTags, setKeywordTags] = useState(entry.keywordTags || []);
      const [tagInput, setTagInput] = useState("");
      const [saving, setSaving] = useState(false);
 
      const toggleTag = (t) => setTags(prev => prev.includes(t) ? prev.filter(x => x !== t) : [...prev, t]);
      const emotionTags = ["😮 驚き", "😟 モヤモヤ", "💡 ひらめき", "❓ 疑問"];
      const addKwTag = () => { const t = tagInput.trim(); if (t && !keywordTags.includes(t)) setKeywordTags(prev => [...prev, t]); setTagInput(""); };
      const removeKwTag = (t) => setKeywordTags(prev => prev.filter(x => x !== t));
 
      const handleSave = async () => {
        setSaving(true);
        const updated = {
          date: new Date(date + "T00:00:00").toLocaleDateString("ja-JP", { month: "numeric", day: "numeric" }),
          dateTime: new Date(date + "T00:00:00").toISOString(),
          event: event.trim(), question: question.trim(), feedback: feedback.trim(), tags, keywordTags,
        };
        await onSave(entry.id, updated);
        setSaving(false);
        onClose();
      };
 
      return (
        <div style={{ position: "fixed", top: 0, left: "50%", transform: "translateX(-50%)", width: "100%", maxWidth: 440, height: "100%", background: "rgba(0,0,0,0.5)", zIndex: 2000, display: "flex", alignItems: "flex-end" }}>

            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 16 }}>
              <div style={{ fontSize: 16, fontWeight: "bold", color: C.ink }}>記録を編集</div>
              <button onClick={onClose} style={{ background: "transparent", border: "none", fontSize: 20, cursor: "pointer", color: C.inkLight }}>✕</button>
            </div>
            <div style={{ marginBottom: 12 }}>
              <div style={{ fontSize: 11, fontWeight: "bold", color: C.green, textTransform: "uppercase", marginBottom: 6 }}>📅 日付</div>
              <input type="date" value={date} onChange={(e) => setDate(e.target.value)} style={{ width: "100%", border: `1.5px solid ${C.bgDeep}`, borderRadius: 10, padding: "10px 12px", fontSize: 14, fontFamily: "'Georgia', serif", background: C.bg, color: C.ink, outline: "none" }} />
            </div>
            <div style={{ marginBottom: 12 }}>
              <div style={{ fontSize: 11, fontWeight: "bold", color: C.green, textTransform: "uppercase", marginBottom: 6 }}>📝 出来事・観察</div>
              <textarea value={event} onChange={(e) => setEvent(e.target.value)} rows={3} style={{ width: "100%", border: `1.5px solid ${C.bgDeep}`, borderRadius: 10, padding: "10px 12px", fontSize: 14, fontFamily: "'Georgia', serif", background: C.bg, color: C.ink, resize: "none", outline: "none", lineHeight: 1.6 }} />
            </div>
            <div style={{ marginBottom: 12 }}>
              <div style={{ fontSize: 11, fontWeight: "bold", color: C.green, textTransform: "uppercase", marginBottom: 6 }}>💡 疑問・気づき</div>
              <textarea value={question} onChange={(e) => setQuestion(e.target.value)} rows={3} style={{ width: "100%", border: `1.5px solid ${C.bgDeep}`, borderRadius: 10, padding: "10px 12px", fontSize: 14, fontFamily: "'Georgia', serif", background: C.bg, color: C.ink, resize: "none", outline: "none", lineHeight: 1.6 }} />
            </div>
            <div style={{ marginBottom: 12 }}>
              <div style={{ fontSize: 11, fontWeight: "bold", color: C.green, textTransform: "uppercase", marginBottom: 6 }}>👨‍🏫 フィードバック</div>
              <textarea value={feedback} onChange={(e) => setFeedback(e.target.value)} rows={2} style={{ width: "100%", border: `1.5px solid ${C.bgDeep}`, borderRadius: 10, padding: "10px 12px", fontSize: 14, fontFamily: "'Georgia', serif", background: C.bg, color: C.ink, resize: "none", outline: "none", lineHeight: 1.6 }} />
            </div>

                {emotionTags.map(t => (
                  <span key={t} onClick={() => toggleTag(t)} style={{ display: "inline-block", padding: "5px 12px", borderRadius: 20, fontSize: 12, background: tags.includes(t) ? C.greenMid : C.greenMid + "22", color: tags.includes(t) ? "#fff" : C.greenMid, cursor: "pointer" }}>{t}</span>
                ))}
              </div>
            </div>
            <div style={{ marginBottom: 16 }}>

    function BoardScreen() {
      const [posts, setPosts] = useState([]);
      const [loading, setLoading] = useState(true);
      const [openComments, setOpenComments] = useState(null);
      const [comments, setComments] = useState({});
      const [commentText, setCommentText] = useState("");

      useEffect(() => {
        const load = async () => {
          try { const data = await fsGetPosts(); setPosts(data); } catch(e) {}
          setLoading(false);
        };
        load();
      }, []);
 
      const handleOpenComments = async (postId) => {
        if (openComments === postId) { setOpenComments(null); return; }
        setOpenComments(postId);
        if (!comments[postId]) {
          try { const data = await fsGetComments(postId); setComments(prev => ({ ...prev, [postId]: data })); } catch(e) {}
        }
      };
 
      const handleAddComment = async (postId) => {
        if (!commentText.trim()) return;
        setPosting(true);
        try {
          await fsAddComment(postId, { uid: getUID(), email: getEmail(), text: commentText.trim(), dateTime: new Date().toISOString(), date: new Date().toLocaleDateString("ja-JP", { month: "numeric", day: "numeric" }) });
          const data = await fsGetComments(postId);
          setComments(prev => ({ ...prev, [postId]: data }));
          setCommentText("");
        } catch(e) { alert("コメントの投稿に失敗しました。"); }
        setPosting(false);
      };
 
      const handleDeletePost = async (postId, postUid) => {
        if (postUid !== getUID() && !isAdmin()) { alert("自分の投稿のみ削除できます。"); return; }
        if (!window.confirm("この投稿を削除しますか？")) return;
        try { await fsDeletePost(postId); setPosts(prev => prev.filter(p => p.id !== postId)); }
        catch(e) { alert("削除に失敗しました。"); }
      };
 
      const handleDeleteComment = async (postId, commentId) => {
        if (!window.confirm("このコメントを削除しますか？")) return;
        try {
          await fsDeleteComment(postId, commentId);
          setComments(prev => ({ ...prev, [postId]: prev[postId].filter(c => c.id !== commentId) }));
        } catch(e) { alert("削除に失敗しました。"); }

  const month = now.getMonth();

  const firstDayOfWeek = new Date(year, month, 1).getDay();
  const offset = firstDayOfWeek;
  const today = now.getDate();
 
  const recordedDays = [...new Set(entries.map(e => new Date(e.dateTime).getDate()))];
  const aiDays = [...new Set(aiLogs.map(l => new Date(l.dateTime).getDate()))];

  const entriesByDate = {};

  const handleDayClick = (d) => {

      setTimeout(() => {
        const container = scrollRef.current;
        const target = dateRefs.current[d];
        const containerRect = container.getBoundingClientRect();
        const targetRect = target.getBoundingClientRect();
        const scrollTop = container.scrollTop + (targetRect.top - containerRect.top) - 10;
        container.scrollTo({ top: scrollTop, behavior: "smooth" });

          {Array.from({ length: offset }).map((_, i) => <div key={`empty-${i}`} />)}
          {Array.from({ length: daysInMonth }, (_, i) => i + 1).map(d => {
            const isRec = recordedDays.includes(d);
            const isAI = aiDays.includes(d);
            const isToday = d === today;
            const isSelected = d === selectedDay;
            return (
              <div key={d} onClick={() => handleDayClick(d)} style={{ textAlign: "center", padding: "5px 0", borderRadius: 8, fontSize: 12, background: isSelected ? C.terra : isToday ? C.green : isRec ? C.greenLight + "55" : "transparent", color: isSelected ? "#fff" : isToday ? "#fff" : isRec ? C.green : C.inkLight, fontWeight: isRec || isToday || isAI ? "bold" : "normal", cursor: isRec ? "pointer" : "default", position: "relative" }}>
                {d}

          <div style={{ display: "flex", alignItems: "center", gap: 4, fontSize: 10, color: C.inkLight }}><div style={{ width: 10, height: 10, borderRadius: 3, background: C.greenLight + "55" }} />日記あり</div>
          <div style={{ display: "flex", alignItems: "center", gap: 4, fontSize: 10, color: C.inkLight }}><div style={{ width: 6, height: 6, borderRadius: "50%", background: C.gold }} />AI提案あり</div>
        </div>
      </div>
 
      {/* 記録一覧（スクロール） */}
      <div ref={scrollRef} style={{ flex: 1, overflowY: "auto", paddingRight: 4 }}>
        {entries.length === 0 ? (
          <div style={{ textAlign: "center", padding: "30px 20px", color: C.inkLight }}>
            <div style={{ fontSize: 36, marginBottom: 8, opacity: 0.4 }}>🌱</div>
            <div style={{ fontSize: 13 }}>まだ記録がありません</div>

        ) : (
          Object.keys(entriesByDate).sort((a, b) => b - a).map(day => {
            const dayEntries = entriesByDate[day];
            const dayAILogs = aiLogs.filter(l => new Date(l.dateTime).getDate() === parseInt(day));

            return (

                <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 8 }}>
                  <div style={{ background: isSelected ? C.terra : C.green, color: "#fff", borderRadius: 20, padding: "3px 14px", fontSize: 12, fontWeight: "bold", flexShrink: 0 }}>
                    {month + 1}月{day}日

                  <div style={{ flex: 1, height: 1, background: C.bgDeep }} />
                </div>
                {dayEntries.map(e => (
                  <div key={e.id} style={{ background: C.cream, border: `1px solid ${C.bgDeep}`, borderLeft: `4px solid ${C.terra}`, borderRadius: 14, padding: "12px 16px", marginBottom: 8 }}>

    </div>

}

            <div>
              <div style={{ fontSize: 22, fontWeight: "bold", color: "#FAF7F2", letterSpacing: "0.08em", fontStyle: "italic" }}>Taneru</div>
              <div style={{ fontSize: 10, color: "#8FB573", letterSpacing: "0.2em", textTransform: "uppercase", marginTop: 2 }}>気づきから研究へ</div>
            </div>
            <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
              <div style={{ fontSize: 10, color: "#8FB573", opacity: 0.8, maxWidth: 120, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{user.email}</div>
              <button onClick={() => setShowHelp(true)} style={{ background: "rgba(255,255,255,0.15)", border: "none", color: "#FAF7F2", borderRadius: "50%", width: 26, height: 26, fontSize: 13, cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "center", fontWeight: "bold", flexShrink: 0 }}>？</button>
            </div>
          </div>
          <div style={{ flex: 1, overflowY: "auto", padding: "20px 20px 100px" }}>
            {screens[screen]}
          </div>
          <div style={{ position: "sticky", bottom: 0, background: "#FAF7F2", borderTop: `1px solid ${C.bgDeep}`, display: "flex", justifyContent: "space-around", padding: "10px 0 16px", boxShadow: "0 -4px 20px rgba(0,0,0,0.06)" }}>
            {NAV.map(({ id, icon, label }) => (
              <div key={id} onClick={() => setScreen(id)} style={{ display: "flex", flexDirection: "column", alignItems: "center", gap: 3, cursor: "pointer", padding: "4px 10px", borderRadius: 12, background: screen === id ? C.green + "18" : "transparent", transition: "all 0.15s" }}>
                <span style={{ fontSize: 22, opacity: screen === id ? 1 : 0.5 }}>{icon}</span>
                <span style={{ fontSize: 9, color: screen === id ? C.green : C.inkLight, fontWeight: screen === id ? "bold" : "normal", letterSpacing: "0.08em" }}>{label}</span>
              </div>
            ))}
          </div>
        </div>
      );
    }
 
    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
