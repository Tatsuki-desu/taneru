<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Taneru — 気づきから研究へ</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.development.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.development.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #E8E2D9; font-family: 'Georgia', 'Times New Roman', serif; }
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-thumb { background: #8FB573; border-radius: 4px; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect } = React;
    const C = {
      bg: "#F7F3ED", bgDeep: "#EDE7DC", green: "#2D5016", greenMid: "#4A7C2F",
      greenLight: "#8FB573", cream: "#FAF7F2", terra: "#C4622D",
      ink: "#1C1C1A", inkLight: "#6B6860", gold: "#D4A843",
    };
    function loadEntries() {
      const data = localStorage.getItem("taneru_entries");
      return data ? JSON.parse(data) : [];
    }
    function saveEntries(entries) {
      localStorage.setItem("taneru_entries", JSON.stringify(entries));
    }
    function HomeScreen() {
      const today = new Date().toLocaleDateString("ja-JP", {
        year: "numeric", month: "long", day: "numeric", weekday: "short",
      });
      const todayStr = new Date().toISOString().split("T")[0];
      const [selectedDate, setSelectedDate] = useState(todayStr);
      const [event, setEvent] = useState("");
      const [question, setQuestion] = useState("");
      const [tags, setTags] = useState([]);
      const [feedback, setFeedback] = useState("");
      const [entries, setEntries] = useState([]);
      const [saved, setSaved] = useState(false);
      const [search, setSearch] = useState("");
      useEffect(() => { setEntries(loadEntries()); }, []);
      const toggleTag = (t) => {
        setTags(prev => prev.includes(t) ? prev.filter(x => x !== t) : [...prev, t]);
      };
      const handlePromote = (entry) => {
        const tab = window.confirm("実地研究Ⅱに追加しますか？\nOK → 実地研究Ⅱ\nキャンセル → 課題研究Ⅱ") ? 0 : 1;
        const promoted = JSON.parse(localStorage.getItem("taneru_promoted") || "[]");
        const already = promoted.find(p => p.id === entry.id && p.tab === tab);
        if (already) { alert("すでに追加済みです。"); return; }
        const updated = [{ ...entry, tab }, ...promoted];
        localStorage.setItem("taneru_promoted", JSON.stringify(updated));
        alert("研究ノートに追加しました！");
      };
      const handleDelete = (id) => {
        if (!window.confirm("この記録を削除しますか？")) return;
        const updated = loadEntries().filter(e => e.id !== id);
        saveEntries(updated);
        setEntries(updated);
      };
      const handleSave = () => {
        if (!event.trim() && !question.trim()) return;
        const newEntry = {
          id: Date.now(),
          date: new Date(selectedDate + "T00:00:00").toLocaleDateString("ja-JP", { month: "numeric", day: "numeric" }),
          dateTime: new Date(selectedDate + "T00:00:00").toISOString(),
          event: event.trim(),
          question: question.trim(),
          tags: tags,
          feedback: feedback.trim(),
        };
        const updated = [newEntry, ...loadEntries()];
        saveEntries(updated);
        setEntries(updated);
        setEvent(""); setQuestion(""); setTags([]);
        setFeedback("");
        setSaved(true);
        setTimeout(() => setSaved(false), 2000);
      };
      const filteredEntries = entries.filter(e => {
        if (!search.trim()) return true;
        const keyword = search.trim().toLowerCase();
        return (
          e.event.toLowerCase().includes(keyword) ||
          e.question.toLowerCase().includes(keyword) ||
          (e.feedback && e.feedback.toLowerCase().includes(keyword))
        );
      });
      const emotionTags = ["😮 驚き", "😟 モヤモヤ", "💡 ひらめき", "❓ 疑問"];
      return (
        <div>
          <div style={{ marginBottom: 20 }}>
            <div style={{ fontSize: 11, color: C.inkLight, letterSpacing: "0.12em", marginBottom: 4 }}>{today}</div>
            <div style={{ fontSize: 20, fontWeight: "bold", color: C.ink, fontStyle: "italic" }}>今日の気づきを記録する</div>
          </div>
          <div style={{ background: C.cream, border: `1px solid ${C.bgDeep}`, borderRadius: 16, padding: "18px 20px", marginBottom: 14, boxShadow: "0 2px 8px rgba(0,0,0,0.04)" }}>
            <div style={{ marginBottom: 14 }}>
              <div style={{ fontSize: 11, fontWeight: "bold", color: C.green, letterSpacing: "0.1em", textTransform: "uppercase", marginBottom: 8 }}>📅 記録する日付</div>
              <input type="date" value={selectedDate} onChange={(e) => setSelectedDate(e.target.value)} style={{ width: "100%", border: `1.5px solid ${C.bgDeep}`, borderRadius: 12, padding: "10px 14px", fontSize: 14, fontFamily: "'Georgia', serif", background: C.bg, color: C.ink, outline: "none" }} />
            </div>
            <div style={{ fontSize: 11, fontWeight: "bold", color: C.green, letterSpacing: "0.1em", textTransform: "uppercase", marginBottom: 8 }}>📝 今日の出来事・観察</div>
            <textarea value={event} onChange={(e) => setEvent(e.target.value)} rows={4} placeholder="今日の実習で気になったこと、観察したこと..." style={{ width: "100%", border: `1.5px solid ${C.bgDeep}`, borderRadius: 12, padding: "12px 14px", fontSize: 14, fontFamily: "'Georgia', serif", background: C.bg, color: C.ink, resize: "none", outline: "none", lineHeight: 1.6 }} />
            <div style={{ marginTop: 14 }}>
              <div style={{ fontSize: 11, fontWeight: "bold", color: C.green, letterSpacing: "0.1em", textTransform: "uppercase", marginBottom: 8 }}>💡 疑問・気づき</div>
              <textarea value={question} onChange={(e) => setQuestion(e.target.value)} rows={3} placeholder="「なぜ？」と思ったこと..." style={{ width: "100%", border: `1.5px solid ${C.bgDeep}`, borderRadius: 12, padding: "12px 14px", fontSize: 14, fontFamily: "'Georgia', serif", background: C.bg, color: C.ink, resize: "none", outline: "none", lineHeight: 1.6 }} />
            </div>
            <div style={{ marginTop: 14 }}>
              <div style={{ marginTop: 14 }}>
              <div style={{ fontSize: 11, fontWeight: "bold", color: C.green, letterSpacing: "0.1em", textTransform: "uppercase", marginBottom: 8 }}>👨‍🏫 指導教員からのフィードバック</div>
              <textarea value={feedback} onChange={(e) => setFeedback(e.target.value)} rows={3} placeholder="先生から言われたこと、アドバイスなど..." style={{ width: "100%", border: `1.5px solid ${C.bgDeep}`, borderRadius: 12, padding: "12px 14px", fontSize: 14, fontFamily: "'Georgia', serif", background: C.bg, color: C.ink, resize: "none", outline: "none", lineHeight: 1.6 }} />
            </div>
              <div style={{ fontSize: 11, fontWeight: "bold", color: C.green, letterSpacing: "0.1em", textTransform: "uppercase", marginBottom: 8 }}>🏷 感情タグ（タップで選択）</div>
              <div style={{ display: "flex", flexWrap: "wrap", gap: 6 }}>
                {emotionTags.map(t => (
                  <span key={t} onClick={() => toggleTag(t)} style={{ display: "inline-block", padding: "5px 12px", borderRadius: 20, fontSize: 12, background: tags.includes(t) ? C.greenMid : C.greenMid + "22", color: tags.includes(t) ? "#fff" : C.greenMid, cursor: "pointer", transition: "all 0.15s" }}>{t}</span>
                ))}
              </div>
            </div>
            <button onClick={handleSave} style={{ background: saved ? C.greenMid : C.green, color: C.cream, border: "none", borderRadius: 12, padding: "13px 24px", fontSize: 14, cursor: "pointer", fontFamily: "'Georgia', serif", fontStyle: "italic", letterSpacing: "0.04em", width: "100%", marginTop: 16, transition: "background 0.2s" }}>
              {saved ? "保存しました！✓" : "この気づきを記録する 🌱"}
            </button>
          </div>
          {entries.length > 0 ? (
            <div>
            <div style={{ marginBottom: 12 }}>
                <input type="text" value={search} onChange={(e) => setSearch(e.target.value)} placeholder="🔍 キーワードで検索..." style={{ width: "100%", border: `1.5px solid ${C.bgDeep}`, borderRadius: 12, padding: "10px 14px", fontSize: 14, fontFamily: "'Georgia', serif", background: C.cream, color: C.ink, outline: "none" }} />
                <div style={{ fontSize: 11, color: C.inkLight, marginTop: 6, textAlign: "right" }}>
                  {search ? `「${search}」の検索結果：${filteredEntries.length}件` : `これまでの記録（${entries.length}件）`}
                </div>
              </div>
              {filteredEntries.map((entry) => (
                <div key={entry.id} style={{ background: C.cream, border: `1px solid ${C.bgDeep}`, borderLeft: `4px solid ${C.terra}`, borderRadius: 16, padding: "16px 20px", marginBottom: 12 }}>
                  <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 8 }}>
                  <span style={{ fontSize: 11, color: C.inkLight }}>{entry.date}</span>
                    <button onClick={() => handleDelete(entry.id)} style={{ background: "transparent", border: "none", color: C.inkLight, cursor: "pointer", fontSize: 16, padding: "0 4px" }}>🗑</button>
                    {entry.tags.length > 0 && (
                      <div>{entry.tags.map(t => (
                        <span key={t} style={{ display: "inline-block", padding: "2px 8px", borderRadius: 20, fontSize: 10, background: C.terra + "22", color: C.terra, marginLeft: 4 }}>{t}</span>
                      ))}</div>
                    )}
                  </div>
                  {entry.event && <div style={{ fontSize: 13, color: C.ink, lineHeight: 1.7, marginBottom: entry.question ? 8 : 0 }}>{entry.event}</div>}
                  {entry.question && <div style={{ fontSize: 13, color: C.greenMid, lineHeight: 1.7, fontStyle: "italic" }}>💡 {entry.question}</div>}
                  {entry.feedback && <div style={{ fontSize: 13, color: C.gold, lineHeight: 1.7, fontStyle: "italic", marginTop: 4 }}>👨‍🏫 {entry.feedback}</div>}
                  <button onClick={() => handlePromote(entry)} style={{ background: "transparent", color: C.green, border: `1.5px solid ${C.green}`, borderRadius: 10, padding: "6px 12px", fontSize: 11, cursor: "pointer", fontFamily: "'Georgia', serif", marginTop: 8 }}>🔬 研究に使う</button>
                </div>
              ))}
            </div>
          ) : (
            <div style={{ textAlign: "center", padding: "30px 20px", color: C.inkLight }}>
              <div style={{ fontSize: 40, marginBottom: 10, opacity: 0.4 }}>🌱</div>
              <div style={{ fontSize: 13 }}>記録を積み重ねると、<br />研究のテーマが見えてくる</div>
            </div>
          )}
        </div>
      );
    }
    function CalendarScreen() {
      const [entries, setEntries] = useState([]);
      useEffect(() => { setEntries(loadEntries()); }, []);
      const days = ["月", "火", "水", "木", "金", "土", "日"];
      const today = new Date().getDate();
      const recordedDays = entries.map(e => new Date(e.dateTime).getDate());
      return (
        <div>
          <div style={{ fontSize: 20, fontWeight: "bold", color: C.ink, fontStyle: "italic", marginBottom: 4 }}>実習カレンダー</div>
          <div style={{ fontSize: 12, color: C.inkLight, marginBottom: 20 }}>記録した日が色づきます</div>
          <div style={{ background: C.cream, border: `1px solid ${C.bgDeep}`, borderRadius: 16, padding: "18px 20px", marginBottom: 14 }}>
            <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 14 }}>
              <span style={{ fontSize: 15, fontWeight: "bold", color: C.ink }}>{new Date().toLocaleDateString("ja-JP", { year: "numeric", month: "long" })}</span>
              <span style={{ background: C.greenMid, color: "#fff", borderRadius: 20, padding: "2px 12px", fontSize: 10, fontWeight: "bold" }}>実習中</span>
            </div>
            <div style={{ display: "grid", gridTemplateColumns: "repeat(7, 1fr)", gap: 4 }}>
              {days.map(d => (
                <div key={d} style={{ textAlign: "center", fontSize: 10, color: C.inkLight, padding: "4px 0" }}>{d}</div>
              ))}
              {Array.from({ length: 30 }, (_, i) => i + 1).map(d => {
                const isRec = recordedDays.includes(d);
                const isToday = d === today;
                return (
                  <div key={d} style={{ textAlign: "center", padding: "7px 0", borderRadius: 8, fontSize: 12, background: isToday ? C.green : isRec ? C.greenLight + "55" : "transparent", color: isToday ? "#fff" : isRec ? C.green : C.inkLight, fontWeight: isRec || isToday ? "bold" : "normal" }}>{d}</div>
                );
              })}
            </div>
          </div>
          <div style={{ background: C.cream, border: `1px solid ${C.bgDeep}`, borderRadius: 16, padding: "18px 20px", marginBottom: 14 }}>
            <div style={{ fontSize: 11, fontWeight: "bold", color: C.green, letterSpacing: "0.1em", textTransform: "uppercase", marginBottom: 12 }}>📊 実習の進捗</div>
            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10 }}>
              {[["記録した件数", `${entries.length}件`, C.green], ["気づき数", `${entries.filter(e => e.question).length}個`, C.terra]].map(([label, val, color]) => (
                <div key={label} style={{ textAlign: "center", background: C.bg, borderRadius: 10, padding: "14px 0" }}>
                  <div style={{ fontSize: 24, fontWeight: "bold", color }}>{val}</div>
                  <div style={{ fontSize: 10, color: C.inkLight, marginTop: 4 }}>{label}</div>
                </div>
              ))}
            </div>
          </div>
        </div>
      );
    }
    function AIScreen() {
      return (
        <div>
          <div style={{ fontSize: 20, fontWeight: "bold", color: C.ink, fontStyle: "italic", marginBottom: 4 }}>AI分析レポート</div>
          <div style={{ fontSize: 12, color: C.inkLight, marginBottom: 20 }}>記録から研究の種を見つける</div>
          <div style={{ background: C.cream, border: `1px solid ${C.bgDeep}`, borderRadius: 16, padding: "30px 20px", textAlign: "center" }}>
            <div style={{ fontSize: 40, marginBottom: 12, opacity: 0.4 }}>🤖</div>
            <div style={{ fontSize: 14, color: C.ink, lineHeight: 1.8 }}>記録が増えたら<br />AIが分析してくれます</div>
            <div style={{ fontSize: 12, color: C.inkLight, marginTop: 8 }}>まずはホームで記録を始めましょう</div>
          </div>
        </div>
      );
    }
   function ResearchScreen() {
  const [tab, setTab] = useState(0);
  const [rqText, setRqText] = useState(["", ""]);
  const [rqStatus, setRqStatus] = useState(["仮", "仮"]);
  const [litTitle, setLitTitle] = useState("");
  const [litNote, setLitNote] = useState("");
  const [literatures, setLiteratures] = useState([]);
  const [promoted, setPromoted] = useState([]);

  useEffect(() => {
    const rq = localStorage.getItem("taneru_rq");
    if (rq) {
      const parsed = JSON.parse(rq);
      setRqText(parsed.text || ["", ""]);
      setRqStatus(parsed.status || ["仮", "仮"]);
    }
    const lit = localStorage.getItem("taneru_literatures");
    if (lit) setLiteratures(JSON.parse(lit));
    const pro = localStorage.getItem("taneru_promoted");
    if (pro) setPromoted(JSON.parse(pro));
  }, []);

  const saveRQ = () => {
    localStorage.setItem("taneru_rq", JSON.stringify({
      text: rqText, status: rqStatus
    }));
    alert("保存しました！");
  };

  const toggleStatus = () => {
    const updated = [...rqStatus];
    updated[tab] = updated[tab] === "仮" ? "確定" : "仮";
    setRqStatus(updated);
  };

  const handleAddLit = () => {
    if (!litTitle.trim() && !litNote.trim()) return;
    const newLit = {
      id: Date.now(),
      title: litTitle.trim(),
      note: litNote.trim(),
      tab: tab,
    };
    const updated = [newLit, ...literatures];
    setLiteratures(updated);
    localStorage.setItem("taneru_literatures", JSON.stringify(updated));
    setLitTitle("");
    setLitNote("");
  };

  const handleDeleteLit = (id) => {
    if (!window.confirm("この文献メモを削除しますか？")) return;
    const updated = literatures.filter(l => l.id !== id);
    setLiteratures(updated);
    localStorage.setItem("taneru_literatures", JSON.stringify(updated));
  };

  const handleDeletePromoted = (id) => {
    if (!window.confirm("この気づきを研究ノートから外しますか？")) return;
    const updated = promoted.filter(p => p.id !== id);
    setPromoted(updated);
    localStorage.setItem("taneru_promoted", JSON.stringify(updated));
  };

  const tabLabels = ["実地研究Ⅱ", "課題研究Ⅱ"];
  const filteredLits = literatures.filter(l => l.tab === tab);
  const filteredPromoted = promoted.filter(p => p.tab === tab);

  return (
    <div>
      <div style={{ fontSize: 20, fontWeight: "bold", color: C.ink, fontStyle: "italic", marginBottom: 4 }}>研究ノート</div>
      <div style={{ fontSize: 12, color: C.inkLight, marginBottom: 16 }}>気づきと文献を研究へつなげる</div>

      {/* タブ切り替え */}
      <div style={{ display: "flex", gap: 8, marginBottom: 16 }}>
        {tabLabels.map((label, i) => (
          <button key={label} onClick={() => setTab(i)} style={{ flex: 1, padding: 10, borderRadius: 10, border: `1.5px solid ${tab === i ? C.green : C.bgDeep}`, background: tab === i ? C.green : "transparent", color: tab === i ? C.cream : C.inkLight, fontFamily: "'Georgia', serif", fontSize: 13, cursor: "pointer" }}>{label}</button>
        ))}
      </div>

      {/* リサーチクエスチョン */}
      <div style={{ background: C.cream, border: `1px solid ${C.bgDeep}`, borderLeft: `4px solid ${C.gold}`, borderRadius: 16, padding: "18px 20px", marginBottom: 14 }}>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 10 }}>
          <div style={{ fontSize: 11, fontWeight: "bold", color: C.green, letterSpacing: "0.1em", textTransform: "uppercase" }}>🔬 リサーチクエスチョン</div>
          <span onClick={toggleStatus} style={{ background: rqStatus[tab] === "確定" ? C.green : C.gold, color: "#fff", borderRadius: 20, padding: "2px 10px", fontSize: 10, fontWeight: "bold", cursor: "pointer" }}>{rqStatus[tab]}</span>
        </div>
        <textarea
          value={rqText[tab]}
          onChange={(e) => {
            const updated = [...rqText];
            updated[tab] = e.target.value;
            setRqText(updated);
          }}
          rows={3}
          placeholder="例：待ち時間における子どもの自発的行動を促す環境要因とは何か？"
          style={{ width: "100%", border: `1.5px solid ${C.bgDeep}`, borderRadius: 12, padding: "12px 14px", fontSize: 14, fontFamily: "'Georgia', serif", background: C.bg, color: C.ink, resize: "none", outline: "none", lineHeight: 1.6 }}
        />
        <div style={{ display: "flex", gap: 8, marginTop: 10 }}>
          <button onClick={saveRQ} style={{ flex: 1, background: C.green, color: C.cream, border: "none", borderRadius: 12, padding: "10px", fontSize: 13, cursor: "pointer", fontFamily: "'Georgia', serif" }}>保存する</button>
          <button style={{ flex: 1, background: "transparent", color: C.green, border: `1.5px solid ${C.green}`, borderRadius: 12, padding: "10px", fontSize: 13, cursor: "pointer", fontFamily: "'Georgia', serif" }}>🤖 RQを提案してもらう</button>
        </div>
      </div>

      {/* 昇格した気づき */}
      <div style={{ background: C.cream, border: `1px solid ${C.bgDeep}`, borderRadius: 16, padding: "18px 20px", marginBottom: 14 }}>
        <div style={{ fontSize: 11, fontWeight: "bold", color: C.green, letterSpacing: "0.1em", textTransform: "uppercase", marginBottom: 12 }}>📌 昇格した気づき</div>
        {filteredPromoted.length > 0 ? (
          filteredPromoted.map((entry) => (
            <div key={entry.id} style={{ borderBottom: `1px solid ${C.bgDeep}`, paddingBottom: 12, marginBottom: 12 }}>
              <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 4 }}>
                <span style={{ fontSize: 11, color: C.inkLight }}>{entry.date}</span>
                <button onClick={() => handleDeletePromoted(entry.id)} style={{ background: "transparent", border: "none", color: C.inkLight, cursor: "pointer", fontSize: 14 }}>🗑</button>
              </div>
              {entry.event && <div style={{ fontSize: 13, color: C.ink, lineHeight: 1.6 }}>{entry.event}</div>}
              {entry.question && <div style={{ fontSize: 13, color: C.greenMid, lineHeight: 1.6, fontStyle: "italic" }}>💡 {entry.question}</div>}
            </div>
          ))
        ) : (
          <div style={{ textAlign: "center", padding: "20px 0", color: C.inkLight, fontSize: 13 }}>
            ホームの記録から「🔬 研究に使う」で追加できます
          </div>
        )}
      </div>

      {/* 文献メモ */}
      <div style={{ background: C.cream, border: `1px solid ${C.bgDeep}`, borderRadius: 16, padding: "18px 20px", marginBottom: 14 }}>
        <div style={{ fontSize: 11, fontWeight: "bold", color: C.green, letterSpacing: "0.1em", textTransform: "uppercase", marginBottom: 12 }}>📚 文献メモ</div>
        <div style={{ marginBottom: 14 }}>
          <input
            type="text"
            value={litTitle}
            onChange={(e) => setLitTitle(e.target.value)}
            placeholder="著者・タイトル・年（例：山田 2020「保育環境論」）"
            style={{ width: "100%", border: `1.5px solid ${C.bgDeep}`, borderRadius: 12, padding: "10px 14px", fontSize: 13, fontFamily: "'Georgia', serif", background: C.bg, color: C.ink, outline: "none", marginBottom: 8 }}
          />
          <textarea
            value={litNote}
            onChange={(e) => setLitNote(e.target.value)}
            rows={3}
            placeholder="内容メモ（自分の言葉で）..."
            style={{ width: "100%", border: `1.5px solid ${C.bgDeep}`, borderRadius: 12, padding: "10px 14px", fontSize: 13, fontFamily: "'Georgia', serif", background: C.bg, color: C.ink, resize: "none", outline: "none", lineHeight: 1.6 }}
          />
          <button onClick={handleAddLit} style={{ width: "100%", background: C.green, color: C.cream, border: "none", borderRadius: 12, padding: "10px", fontSize: 13, cursor: "pointer", fontFamily: "'Georgia', serif", marginTop: 8 }}>＋ 文献メモを追加する</button>
        </div>
        {filteredLits.length > 0 && (
          <div>
            <div style={{ fontSize: 11, color: C.inkLight, marginBottom: 8 }}>追加済みの文献（{filteredLits.length}件）</div>
            {filteredLits.map((lit) => (
              <div key={lit.id} style={{ background: C.bg, borderRadius: 10, padding: "12px 14px", marginBottom: 8 }}>
                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start" }}>
                  <div style={{ fontSize: 13, fontWeight: "bold", color: C.ink, flex: 1 }}>{lit.title}</div>
                  <button onClick={() => handleDeleteLit(lit.id)} style={{ background: "transparent", border: "none", color: C.inkLight, cursor: "pointer", fontSize: 14, marginLeft: 8 }}>🗑</button>
                </div>
                {lit.note && <div style={{ fontSize: 12, color: C.inkLight, lineHeight: 1.6, marginTop: 4 }}>{lit.note}</div>}
              </div>
            ))}
          </div>
        )}
        <button style={{ width: "100%", background: "transparent", color: C.green, border: `1.5px solid ${C.green}`, borderRadius: 12, padding: "10px", fontSize: 13, cursor: "pointer", fontFamily: "'Georgia', serif", marginTop: 8 }}>🤖 関連文献を探す</button>
      </div>
    </div>
  );
}
    function SettingsScreen() {
      const handleClear = () => {
        if (window.confirm("すべての記録を削除しますか？この操作は元に戻せません。")) {
          localStorage.removeItem("taneru_entries");
          alert("記録を削除しました。");
        }
      };
      return (
        <div>
          <div style={{ fontSize: 20, fontWeight: "bold", color: C.ink, fontStyle: "italic", marginBottom: 4 }}>設定</div>
          <div style={{ fontSize: 12, color: C.inkLight, marginBottom: 20 }}>実習情報・アプリの設定</div>
          <div style={{ background: C.cream, border: `1px solid ${C.bgDeep}`, borderRadius: 16, padding: "18px 20px", marginBottom: 14 }}>
            <div style={{ fontSize: 11, fontWeight: "bold", color: C.green, letterSpacing: "0.1em", textTransform: "uppercase", marginBottom: 12 }}>💾 データ管理</div>
            <div style={{ fontSize: 13, color: C.ink, lineHeight: 1.7, marginBottom: 12 }}>記録はこのMacのブラウザに保存されています。</div>
            <button onClick={handleClear} style={{ background: "transparent", color: C.terra, border: `1.5px solid ${C.terra}`, borderRadius: 12, padding: "10px", fontSize: 13, cursor: "pointer", fontFamily: "'Georgia', serif", width: "100%" }}>
              すべての記録を削除する
            </button>
          </div>
          <div style={{ textAlign: "center", marginTop: 20, color: C.inkLight, fontSize: 11, letterSpacing: "0.1em" }}>Taneru v0.1 — 気づきから研究へ 🌱</div>
        </div>
      );
    }
    const NAV = [
      { id: "home", icon: "✏️", label: "記録" },
      { id: "calendar", icon: "📅", label: "カレンダー" },
      { id: "ai", icon: "🤖", label: "AI分析" },
      { id: "research", icon: "🔬", label: "研究" },
      { id: "settings", icon: "⚙️", label: "設定" },
    ];
    function App() {
      const [screen, setScreen] = useState("home");
      const screens = {
        home: <HomeScreen />,
        calendar: <CalendarScreen />,
        ai: <AIScreen />,
        research: <ResearchScreen />,
        settings: <SettingsScreen />,
      };
      return (
        <div style={{ fontFamily: "'Georgia', 'Times New Roman', serif", background: C.bg, minHeight: "100vh", maxWidth: 440, margin: "0 auto", display: "flex", flexDirection: "column", boxShadow: "0 0 40px rgba(0,0,0,0.12)" }}>
          <div style={{ background: C.green, padding: "18px 24px 14px", display: "flex", alignItems: "center", justifyContent: "space-between", position: "relative", overflow: "hidden" }}>
            <div>
              <div style={{ fontSize: 22, fontWeight: "bold", color: "#FAF7F2", letterSpacing: "0.08em", fontStyle: "italic" }}>Taneru</div>
              <div style={{ fontSize: 10, color: "#8FB573", letterSpacing: "0.2em", textTransform: "uppercase", marginTop: 2 }}>気づきから研究へ</div>
            </div>
            <div style={{ fontSize: 52, opacity: 0.12, position: "absolute", right: 16, top: 4 }}>🌿</div>
          </div>
          <div style={{ flex: 1, overflowY: "auto", padding: "20px 20px 100px" }}>
            {screens[screen]}
          </div>
          <div style={{ position: "sticky", bottom: 0, background: "#FAF7F2", borderTop: `1px solid ${C.bgDeep}`, display: "flex", justifyContent: "space-around", padding: "10px 0 16px", boxShadow: "0 -4px 20px rgba(0,0,0,0.06)" }}>
            {NAV.map(({ id, icon, label }) => (
              <div key={id} onClick={() => setScreen(id)} style={{ display: "flex", flexDirection: "column", alignItems: "center", gap: 3, cursor: "pointer", padding: "4px 10px", borderRadius: 12, background: screen === id ? C.green + "18" : "transparent", transition: "all 0.15s" }}>
                <span style={{ fontSize: 22, opacity: screen === id ? 1 : 0.5 }}>{icon}</span>
                <span style={{ fontSize: 9, color: screen === id ? C.green : C.inkLight, fontWeight: screen === id ? "bold" : "normal", letterSpacing: "0.08em" }}>{label}</span>
              </div>
            ))}
          </div>
        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
